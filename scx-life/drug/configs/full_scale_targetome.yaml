# SCX Drug — Full-Scale Targetome Pipeline
#
# Covers ~15,000 molecules × ~5,000 human targets = 75M drug-target pairs.
#
# Hardware requirements
# ---------------------
#   RAM    : ≥ 32 GB (64 GB recommended)
#   GPU    : RTX 4090 24 GB (for Layer 3 ML inference)
#   Disk   : ~10 GB intermediate, ~5 GB final output
#   Time   : ~30 minutes (Layers 1–3), +optional 2 days (docking top-1000)
#
# Database prerequisites
# ----------------------
#   Run scripts/download_databases.py --output W:/scx_databases --tier 1
#   before executing this pipeline.
#
# Usage
# -----
#   from scx_drug import DrugPipeline, make_initial_state
#
#   state = make_initial_state(
#       "inputs/all_compounds_15k.csv",
#       "inputs/all_human_targets_5k.csv",
#   )
#   pipeline = DrugPipeline.from_yaml("configs/full_scale_targetome.yaml")
#   states = pipeline.run(state)
#   pipeline.write_target_profiles(states[-1], "outputs/full_targetome/")

pipeline:
  name: "full_scale_human_targetome"
  description: >
    Complete drug-target interaction profiling: 15K molecules × 5K human targets.
    Four-layer funnel: knowledge-base → similarity → ML → docking.

metadata:
  created: "2026-06-27"
  target_organism: "human"
  database_root: "W:/scx_databases"
  expected_pairs: 75000000
  chunk_size: 500000

steps:

  # ═══════════════════════════════════════════════════════════════════════
  # Step 1: Molecular featurization
  # ═══════════════════════════════════════════════════════════════════════
  - type: "molecule_featurize"
    name: "compute_all_descriptors"
    recipe:
      fingerprint_types:
        - "ecfp4"         # 2048-bit Morgan fingerprint (radius 2)
        - "maccs"         # 167-bit MACCS keys
        - "rdkit"         # 2048-bit RDKit topological fingerprint
      descriptor_list: "all"
      sanitize: true
      add_hydrogens: false

  # ═══════════════════════════════════════════════════════════════════════
  # Step 2: Drug-likeness pre-filter
  # ═══════════════════════════════════════════════════════════════════════
  - type: "drug_likeness"
    name: "filter_druglike"
    recipe:
      rules:
        - "lipinski"
        - "veber"
        - "ghose"
        - "qed"

  # ═══════════════════════════════════════════════════════════════════════
  # Step 3: Knowledge-base lookup (Layer 1 — fastest)
  # ═══════════════════════════════════════════════════════════════════════
  - type: "knowledge_base_lookup"
    name: "query_databases"
    recipe:
      db_path: "W:/scx_databases/drugbank/drugbank_targets.parquet"
      min_confidence: 0.5         # Keep even low-confidence KB hits
      databases:
        - "drugbank"
        - "chembl"
        - "bindingdb"
        - "dgidb"
        - "ttd"

  # If using the standalone duckdb version (dti.py), pass the DB directory:
  # - type: "knowledge_base_lookup"
  #   recipe:
  #     db_path: "W:/scx_databases/knowledge_base.duckdb"
  #     min_confidence: 0.7

  # ═══════════════════════════════════════════════════════════════════════
  # Step 4: Similarity inference (Layer 2 — fingerprint transfer)
  # ═══════════════════════════════════════════════════════════════════════
  - type: "similarity_inference"
    name: "transfer_by_similarity"
    recipe:
      tanimoto_threshold: 0.70     # Conservative: only transfer strong analogs
      max_analogs_per_pair: 3
      # "fast_mode": true           # Use precomputed pairwise similarity matrix

  # ═══════════════════════════════════════════════════════════════════════
  # Step 5: Deep learning DTI prediction (Layer 3 — GPU)
  # ═══════════════════════════════════════════════════════════════════════
  - type: "dti_deep_predictor"
    name: "deep_prediction"
    recipe:
      model_path: "W:/scx_models/graphdta_v2.pt"
      device: "cuda"               # RTX 4090
      confidence_threshold: 0.5
      batch_size: 2048             # Larger batch for 4090's 24GB
      fp16: true                   # Mixed precision for speed

  # ═══════════════════════════════════════════════════════════════════════
  # Step 6: Docking verification (Layer 4 — CPU, top-N only)
  # ═══════════════════════════════════════════════════════════════════════
  - type: "docking_verification"
    name: "verify_by_docking"
    recipe:
      max_pairs: 1000              # Dock only top 1000 novel predictions
      vina_exhaustiveness: 8
      vina_binary: "vina"
      receptor_dir: "W:/scx_databases/receptors"
      num_cpus: 24                 # Parallel docking jobs

output:
  format:
    - "csv"
    - "parquet"
  dir: "W:/scx_runs/full_targetome_2026"
