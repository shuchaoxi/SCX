# SCX Drug — Target Profiling Pipeline Demo
#
# This pipeline takes a list of SMILES strings and a list of protein targets,
# then computes drug-target interaction predictions through four evidence layers:
#
#   1. Knowledge-base lookup (DrugBank / ChEMBL / BindingDB)
#   2. Fingerprint similarity inference
#   3. Deep learning DTI prediction (GraphDTA)
#   4. Docking verification (top-N only)
#
# Usage:
#   from scx_drug import DrugPipeline, make_initial_state
#   state = make_initial_state("compounds.csv", "targets.csv")
#   pipeline = DrugPipeline.from_yaml("configs/dti_pipeline_demo.yaml")
#   states = pipeline.run(state)

pipeline:
  name: "broad_target_profiling_demo"
  description: "Demo pipeline: 100 compounds × 500 targets"

steps:
  # ── Step 1: Molecular featurization ──────────────────────────────────
  - type: "molecule_featurize"
    name: "compute_descriptors_and_fingerprints"
    recipe:
      fingerprint_types:
        - "ecfp4"
        - "maccs"
      descriptor_list: "all"         # compute all RDKit 2D descriptors
      sanitize: true
      add_hydrogens: false

  # ── Step 2: Drug-likeness filter ─────────────────────────────────────
  - type: "drug_likeness"
    name: "assess_druglikeness"
    recipe:
      rules:
        - "lipinski"
        - "veber"
        - "ghose"
        - "qed"
      lipinski_strict: true

  # ── Step 3: Knowledge-base lookup ────────────────────────────────────
  - type: "knowledge_base_lookup"
    name: "query_known_interactions"
    recipe:
      db_path: "data/knowledge_bases/drugbank_targets.parquet"
      min_confidence: 0.7
      databases:
        - "drugbank"
        - "chembl"
        - "bindingdb"

  # ── Step 4: Similarity inference ─────────────────────────────────────
  - type: "similarity_inference"
    name: "infer_by_fingerprint_similarity"
    recipe:
      tanimoto_threshold: 0.70
      max_analogs_per_pair: 3

  # ── Step 5: Deep DTI prediction ──────────────────────────────────────
  - type: "dti_deep_predictor"
    name: "deep_learning_prediction"
    recipe:
      model_path: "models/graphdta_v2.pt"
      device: "cuda"
      confidence_threshold: 0.5
      batch_size: 1024

  # ── Step 6: Docking verification ─────────────────────────────────────
  - type: "docking_verification"
    name: "structure_based_verification"
    recipe:
      max_pairs: 200
      vina_exhaustiveness: 8

output:
  format:
    - "csv"
    - "parquet"
  dir: "outputs/target_profiles"
