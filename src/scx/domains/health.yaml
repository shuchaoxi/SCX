# SCX 领域配置: Health (Medical Image Analysis)
# 医学图像数据价值审计与专家复核调度
domain: health_image
description: "医学图像数据价值审计与专家复核调度"

encoder:
  class: scx.encoders.vision.VisionEncoder
  params:
    backbone: simple_cnn
    device: cpu
    input_size: 224

experts:
  - name: ai_model_v1
    type: model
    cost: 0.1
  - name: ai_model_v2
    type: model
    cost: 0.2
  - name: junior_doctor
    type: human
    cost: 50.0
  - name: senior_doctor
    type: human
    cost: 200.0

state_config:
  n_states: 30
  cluster_method: kmeans
  random_state: 42

thresholds:
  error_high: 0.3
  density_high: 0.02
  consistency_high: 0.6
  redundancy_high: 0.85
  noise_high: 0.4
  expert_gap: 0.25

loss_fn: cross_entropy

actions:
  - keep
  - compress
  - route
  - relabel
