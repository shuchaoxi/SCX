# SCX 领域配置: CIFAR Image Classification
# CIFAR 图像数据价值评估
domain: cifar_image
description: "CIFAR 图像数据价值评估"

encoder:
  class: scx.encoders.vision.VisionEncoder
  params:
    backbone: simple_cnn
    device: cpu
    input_size: 32

experts:
  - name: cnn_small
    type: model
    cost: 0.1
  - name: cnn_large
    type: model
    cost: 0.5
  - name: resnet50
    type: model
    cost: 1.0

state_config:
  n_states: 25
  cluster_method: kmeans
  random_state: 42

thresholds:
  error_high: 0.3
  density_high: 0.04
  consistency_high: 0.6
  redundancy_high: 0.85
  noise_high: 0.5
  expert_gap: 0.2

loss_fn: cross_entropy

actions:
  - keep
  - compress
  - route
  - relabel
