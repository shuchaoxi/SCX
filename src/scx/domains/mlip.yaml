# SCX 领域配置: MLIP (Machine Learning Interatomic Potentials)
# 机器学习原子间势函数的数据价值评估与专家路由
domain: mlip
description: "机器学习原子间势函数的数据价值评估与专家路由"

encoder:
  class: scx.encoders.mlip.MLIPEncoder
  params:
    descriptor: ace
    species: ["Al", "Ga", "N"]
    rcut: 4.0

experts:
  - name: ACE
    type: model
    cost: 0.5
  - name: NEP
    type: model
    cost: 0.3
  - name: MACE
    type: model
    cost: 1.0
  - name: DFT
    type: simulation
    cost: 100.0

state_config:
  n_states: 10
  cluster_method: kmeans
  random_state: 42

thresholds:
  error_high: 0.05       # eV/atom
  density_high: 0.05
  consistency_high: 0.7
  redundancy_high: 0.8
  noise_high: 0.5
  expert_gap: 0.3

loss_fn: mse

actions:
  - acquire
  - compress
  - route
  - high_fidelity
